<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Minecraft grass block">
  <rect width="512" height="512" fill="#3a7322"/>
  <!-- grass block, centered in maskable safe zone -->
  <g>
    <!-- dirt body -->
    <rect x="128" y="176" width="256" height="208" fill="#79553a"/>
    <!-- grass top -->
    <rect x="128" y="128" width="256" height="64" fill="#5faf3a"/>
    <!-- grass drip -->
    <rect x="160" y="192" width="32" height="24" fill="#5faf3a"/>
    <rect x="256" y="192" width="32" height="32" fill="#5faf3a"/>
    <rect x="336" y="192" width="24" height="20" fill="#5faf3a"/>
    <!-- grass top shading pixels -->
    <rect x="128" y="128" width="48" height="24" fill="#6fc247"/>
    <rect x="224" y="152" width="40" height="24" fill="#4f9a2f"/>
    <rect x="320" y="132" width="40" height="20" fill="#6fc247"/>
    <!-- dirt shading pixels -->
    <rect x="160" y="232" width="48" height="40" fill="#6a4a33"/>
    <rect x="256" y="280" width="56" height="48" fill="#8a6446"/>
    <rect x="320" y="320" width="40" height="40" fill="#6a4a33"/>
    <rect x="160" y="320" width="40" height="40" fill="#8a6446"/>
  </g>
</svg>
